<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="wrap">
        <div class="card">
            <!-- <div class="logo">&#9889;</div> -->
            <h1>Create an account</h1>
            <p class="sub">Sign up to get started</p>

            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
                <p class="error" id="email-error">Please enter a valid email address.</p>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" />
                <p class="hint">Must be at least 8 characters.</p>
                <p class="error" id="pass-error">Password must be at least 8 characters.</p>
            </div>

            <div class="field">
                <label for="confirm">Confirm password</label>
                <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password" />
                <p class="error" id="confirm-error">Passwords do not match.</p>
            </div>

            <!-- <button class="btn" onclick="handleSignup()">Sign up</button>
              -->
            <button class="btn" id="signup-btn">Sign up</button>

            <p class="terms">
                By signing up, you agree to our
                <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
            </p>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>

</html>
